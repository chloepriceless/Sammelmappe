<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#2c5fd9">
  <title>Sammelmappe — Einrichtung</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-card">
    <h1>Erste Einrichtung</h1>
    <p>Lege ein Passwort fest, mit dem du dich künftig anmeldest.</p>
    <form class="auth-form" id="setup-form">
      <input type="password" name="password" placeholder="Passwort (min. 6 Zeichen)" autocomplete="new-password" required minlength="6" autofocus>
      <input type="password" name="password_confirm" placeholder="Passwort bestätigen" autocomplete="new-password" required minlength="6">
      <button type="submit">Loslegen</button>
      <div class="error" id="err"></div>
    </form>
  </div>
  <script>
    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const err = document.getElementById('err');
      err.textContent = '';
      if (fd.get('password') !== fd.get('password_confirm')) {
        err.textContent = 'Passwörter stimmen nicht überein';
        return;
      }
      try {
        const r = await fetch('/api/auth/setup', { method: 'POST', body: fd, redirect: 'manual' });
        if (r.status === 303 || r.type === 'opaqueredirect' || r.ok) { location.href = '/'; return; }
        const data = await r.json().catch(() => ({}));
        err.textContent = data.detail || 'Einrichtung fehlgeschlagen';
      } catch (ex) {
        err.textContent = 'Verbindungsfehler';
      }
    });
  </script>
</body>
</html>
